services:
  postgres:
    image: postgres:16
    ports:
      - 5431:5432
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
  redis-stack:
    image: redis/redis-stack:latest
    ports:
      - 8001:8001
      - 6379:6379
    volumes:
      - redis_auth_data:/data

volumes:
  postgres_auth_data:
  redis_auth_data:
